<h2>Logical operators are used to determine the logic between variables or values.</h2>
<p>The AND operator (&&) returns true if both expressions are true, otherwise it returns false.</p>

<p id ="demo"></p>

<script>

let x = 10;
y = 5;
document.getElementById("demo").innerHTML = ( x < 15 && y > 3) + "<br>" + ( x < 10 && y > 10);

</script>
