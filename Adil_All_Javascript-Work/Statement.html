<p> JavaScript Code Block </p>


<h2>JavaScript Statements</h2>

<p>JavaScript code blocks are written between { and }</p>

<button type = "button" onclick="myfunction()"> Click Me </button>

<p id ="demo"></p>
<p id ="demo1"></p>
<p id ="demo2"></p>

<script>
function myfunction() 
{
   document.getElementById("demo").innerHTML ="Hello John !";   
   document.getElementById("demo1").innerHTML ="How are You !";  
   document.getElementById("demo2").innerHTML = 5 * 10 ;     
}

</script>
