<h2>JavaScript HTML DOM</h2>
<img id="image" src="1.jpg" width="160" height="120">

<script>
document.getElementById("image").src = "2.jpeg";
</script>

<p>The original image was smiley.gif, but the script changed it to landscape.jpg</p>

<h3>To Find a Date We can Use Date() </h3>

<p id="demo"></p>

<script>
document.getElementById("demo").innerHTML = "Today Date is : " + Date();
</script>

<h4> We can also use Write to Find a Date</h4>

<script>
document.write(Date());
</script>
