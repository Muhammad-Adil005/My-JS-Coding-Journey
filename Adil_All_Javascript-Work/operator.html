<html>
<head> 
<title> Operators in Javascript </title>
</head>
<body>

<h2> Operators used Here is + and *  </h2>

<p id="demo"></p>
<p id="demo1"></p>

<script>
let x,y,z;
x = 20;
y = 30;
z = x + y;
let a,b,c;
a = 100;
b = 200;
c = a * b;
document.getElementById("demo").innerHTML = z;
document.getElementById("demo1").innerHTML = c;

</script>



</body>
</html>
