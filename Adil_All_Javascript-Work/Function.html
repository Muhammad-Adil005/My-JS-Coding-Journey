<html>
<head> 
<title> function in Javascript </title>
</head>
<body>

<h2>JavaScript Functions</h2>

<p>This example calls a function which performs a calculation, and returns the result:</p>

<p id="demo"></p>
<p id="demo1"></p>

<script>
function myfunction(p1, p2)
{
  return p1 * p2;
}
document.getElementById("demo").innerHTML = myfunction(10, 20);
</script>


<script>
function myfunction1(v1, v2)
{
  return v1 * v2;
}
document.getElementById("demo1").innerHTML = myfunction1(100, 30);
</script>


</body>
</html>
