<html>
<head> 
<title> Syntax in Javascript </title>
</head>
<body>

<p><b> The let keyword tells the browser to create variables: </b></p>

<p id="demo"></p>

<script>
let A,B,C;
A = 50;
B = 10;
C = A * B;
document.getElementById("demo").innerHTML = C ;
</script>

<h1> VAR is also Used to Create a Variable  </h1>
<h2>The var Keyword Creates Variables</h2>

<p id="demo1"></p>

<script> 
var a,b,c;
a = 50;
b = 10;
c = A * B;
document.getElementById("demo1").innerHTML = c ;
</script>


</body>
</html>
