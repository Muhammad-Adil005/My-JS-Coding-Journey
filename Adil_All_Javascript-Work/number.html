<h2>JavaScript Numbers</h2>

<p>Integers (numbers without a period or exponent notation) are accurate up to 15 digits:</p>

<p id="demo"></p>

<script>
let x = 999999999999999;
let y = 999999999999999;
document.getElementById("demo").innerHTML = x + "<br>" + y;
</script>

<p> Addition of Two number can be done in a JavaScript By using +  Symbol </p>
<p id="demo1"></p>

<script>
let A = 20;
let B = 30;
let C = A + B;
document.getElementById("demo1").innerHTML = C;
</script>

<h2>JavaScript Numbers</h2>

<p>If you add a number and a numeric string, the result will be a concatenated string:</p>

<p id="demo2"></p>

<script>
let D = 1000;
let E = "300";
let F = D + E;
document.getElementById("demo2").innerHTML = F;
</script>
